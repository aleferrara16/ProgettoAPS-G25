<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SSO di Ateneo (Mock)</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .sso-container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .sso-logo {
            font-size: 2rem;
            color: #0056b3;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="sso-container">
        <div class="sso-logo">🏛️ SSO Ateneo</div>
        <h3>Autenticazione Centralizzata</h3>
        <p>Inserisci le tue credenziali istituzionali per accedere ai servizi dell'Ateneo.</p>
        
        {% if error %}
        <div class="alert error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('oidc.authorize') }}">
            <div style="margin-bottom: 15px; text-align: left;">
                <label for="matricola" style="display:block; margin-bottom:5px;">Matricola / Username:</label>
                <input type="text" id="matricola" name="matricola" class="input-field" style="width: 100%; box-sizing: border-box;" required placeholder="Es: 10002345">
            </div>
            <div style="margin-bottom: 20px; text-align: left;">
                <label for="password" style="display:block; margin-bottom:5px;">Password:</label>
                <input type="password" id="password" name="password" class="input-field" style="width: 100%; box-sizing: border-box;" placeholder="Qualsiasi password (è un mock)">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Accedi</button>
        </form>
        <p class="help-text" style="margin-top: 15px;">Le matricole valide per i test sono: 10002345, 10005678, 10009101</p>
    </div>
</body>
</html>
